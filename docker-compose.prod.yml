services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-api
    restart: unless-stopped
    env_file:
      - /srv/docker/secrets/bytefile.env
    networks:
      - internal
      - proxy

  worker-expiry:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-worker-expiry
    restart: unless-stopped
    command: ["--worker=expiry"]
    env_file:
      - /srv/docker/secrets/bytefile.env
    networks:
      - internal

  worker-multipart:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-worker-multipart
    restart: unless-stopped
    command: ["--worker=multipart"]
    env_file:
      - /srv/docker/secrets/bytefile.env
    networks:
      - internal

  worker-gc:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-worker-gc
    restart: unless-stopped
    command: ["--worker=gc"]
    env_file:
      - /srv/docker/secrets/bytefile.env
    networks:
      - internal

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://bytefile-api.pranavdhawale.in
    container_name: bytefile-client
    restart: unless-stopped
    networks:
      - proxy

networks:
  internal:
    external: true
  proxy:
    external: true
