services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-api
    restart: unless-stopped
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=${REDIS_URI}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SWK=${SWK}
    networks:
      - internal
      - proxy

  worker-expiry:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-worker-expiry
    restart: unless-stopped
    command: ["--worker=expiry"]
    environment:
      - ENVIRONMENT=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=${REDIS_URI}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks:
      - internal

  worker-multipart:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-worker-multipart
    restart: unless-stopped
    command: ["--worker=multipart"]
    environment:
      - ENVIRONMENT=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=${REDIS_URI}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks:
      - internal

  worker-gc:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bytefile-worker-gc
    restart: unless-stopped
    command: ["--worker=gc"]
    environment:
      - ENVIRONMENT=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=${REDIS_URI}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    networks:
      - internal

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://bytefile-api.pranavdhawale.in
    container_name: bytefile-client
    restart: unless-stopped
    networks:
      - proxy

networks:
  internal:
    external: true
  proxy:
    external: true
